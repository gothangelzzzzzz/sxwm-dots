[colors]
background = #cc1a1c1e
background-alt = #3c4145
foreground = #d8d2c1
primary = #c9a959
secondary = #4a6477
alert = #8c3f36
disabled = #4b5157

[bar/main]
width = 98%
height = 32pt
offset-x = 1%
offset-y = 1%
radius = 2
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
padding-left = 1
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Commit Mono:size=12;2"
font-1 = "Commit Mono:size=15;3"

modules-left = xworkspaces
modules-center = date
modules-right = nowplaying memory cpu dunst

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM :"
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU :"
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}
label-font = 2

#[module/dunst]
#type = custom/script
#exec = echo "Notif "
#exec-if = pgrep -x dunst
#interval = 5
#format = <label>
#label-foreground = ${colors.primary}
#click-left = dunstctl set-paused toggle
#click-middle = dunstctl close-all

[module/nowplaying]
type = custom/script
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.secondary}
label = %output:0:30:...%
label-foreground = ${colors.secondary}
exec = playerctl metadata --format '{{ title }}' 2>/dev/null || echo "Offline"
click-left = playerctl play-pause
scroll-up = playerctl next
scroll-down = playerctl previous

[settings]
screenchange-reload = true
pseudo-transparency = true

